name: Main CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Docker/Dockerfile.test
          push: false
          load: true
          tags: socialmedia-test:${{ github.sha }}
          cache-from: type=gha,scope=test-image
          cache-to: type=gha,mode=max,scope=test-image
      - name: Run unit tests
        run: |
          mkdir -p ${{ github.workspace }}/test-results/unit
          docker run --rm \
            -v ${{ github.workspace }}/test-results/unit:/app/test-results \
            socialmedia-test:${{ github.sha }} \
            --no-build \
            --filter "Category=Unit" \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory /app/test-results

      - name: Publish unit test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: test-results/unit/*.trx
          reporter: dotnet-trx

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Docker/Dockerfile.test
          push: false
          load: true
          tags: socialmedia-test:${{ github.sha }}
          cache-from: type=gha,scope=test-image
          cache-to: type=gha,mode=max,scope=test-image

      - name: Cache Testcontainers Docker images
        id: cache-docker
        uses: actions/cache@v5
        with:
          path: /tmp/docker-images
          key: docker-images-${{ runner.os }}-mssql-2022-latest

      - name: Load cached images
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          docker load < /tmp/docker-images/mssql.tar

      - name: Pull and save images
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker pull mcr.microsoft.com/mssql/server:2022-latest
          mkdir -p /tmp/docker-images
          docker save mcr.microsoft.com/mssql/server:2022-latest > /tmp/docker-images/mssql.tar

      - name: Run integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: |
          mkdir -p ${{ github.workspace }}/test-results/integration
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/test-results/integration:/app/test-results \
            socialmedia-test:${{ github.sha }} \
            --no-build \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory /app/test-results

      - name: Publish integration test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Test Results
          path: test-results/integration/*.trx
          reporter: dotnet-trx
