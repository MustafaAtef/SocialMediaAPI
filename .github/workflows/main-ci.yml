name: Main CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test --no-build --configuration Release \
            --filter "Category=Unit" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory test-results/unit

      - name: Publish unit test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: test-results/unit/*.trx
          reporter: dotnet-trx

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Docker/Dockerfile.test
          push: false
          load: true
          tags: socialmedia-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration tests
        run: |
          mkdir -p ${{ github.workspace }}/test-results/integration
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/test-results/integration:/app/test-results \
            socialmedia-test:${{ github.sha }} \
            --no-build \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory /app/test-results

      - name: Publish integration test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Test Results
          path: test-results/integration/*.trx
          reporter: dotnet-trx
